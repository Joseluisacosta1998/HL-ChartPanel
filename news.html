<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Noticias Cripto</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--bg2:#0e1018;--bg3:#13161f;--bg4:#1a1e2a;
  --green:#00e5a0;--red:#ff4466;--yellow:#f5a623;
  --text:#e2e8f4;--muted:#5a6278;--muted2:#3d4358;
  --border:#1f2435;--border2:#262c3d;
  --accent:#5b6ef5;--accent2:#7c8cf8;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'Inter',sans-serif;
}
html{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100%;
  display:flex;flex-direction:column;overscroll-behavior:none}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:8px;padding:9px 14px;position:sticky;top:0;z-index:50;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
#back-link{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);
  border-radius:8px;padding:7px 11px;cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:700;
  color:var(--text);text-decoration:none;transition:all .15s}
#back-link:hover{border-color:var(--accent2);color:var(--accent2)}
#title-block{display:flex;flex-direction:column;gap:1px;margin-right:auto}
#title-block .t1{font-family:var(--font-mono);font-size:15px;font-weight:700}
#title-block .t2{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.5px}
#refresh-btn{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);
  border-radius:8px;padding:7px 11px;cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:700;
  color:var(--text);transition:all .15s}
#refresh-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#refresh-btn.loading #refresh-icon{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#notif-slot{display:flex}

/* ── FILTER BAR ── */
#filterbar{display:flex;align-items:center;gap:8px;padding:9px 14px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg3)}
.chip-group{display:flex;gap:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:3px}
.f-chip{padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);
  font-family:var(--font-mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap}
.f-chip:hover{color:var(--text)}
.f-chip.active{background:rgba(91,110,245,.15);color:var(--accent2)}
#sort-select{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);
  font-family:var(--font-mono);font-size:10px;font-weight:700;padding:6px 8px;cursor:pointer;outline:none}
#status-line{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--muted2);white-space:nowrap}

/* ── LISTA DE NOTICIAS ── */
#news-wrap{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;max-width:760px;margin:0 auto;width:100%}
.news-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;
  display:flex;flex-direction:column;gap:7px;transition:border-color .3s, background .3s}
.news-card.is-new{border-color:rgba(91,110,245,.55);background:rgba(91,110,245,.05)}
.nc-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nc-source{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--accent2);
  background:rgba(91,110,245,.12);border-radius:5px;padding:2px 7px}
.nc-badge{font-family:var(--font-mono);font-size:9px;font-weight:700;border-radius:5px;padding:2px 7px;
  display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.nc-badge.up{color:var(--green);background:rgba(0,229,160,.12)}
.nc-badge.down{color:var(--red);background:rgba(255,68,102,.12)}
.nc-badge.neutral{color:var(--yellow);background:rgba(245,166,35,.12)}
.nc-badge.impact-alto{color:#ff7a1a;background:rgba(255,122,26,.14)}
.nc-badge.impact-medio{color:var(--yellow);background:rgba(245,166,35,.12)}
.nc-badge.impact-bajo{color:var(--muted);background:rgba(90,98,120,.15)}
.nc-new-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;color:#fff;background:var(--accent);
  border-radius:5px;padding:2px 7px}
.nc-time{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--muted);white-space:nowrap}
.nc-title{font-family:var(--font-ui);font-size:14.5px;font-weight:600;line-height:1.4;color:var(--text);
  text-decoration:none}
.nc-title:hover{color:var(--accent2)}
.nc-original{font-family:var(--font-ui);font-size:11.5px;color:var(--muted);line-height:1.4;font-style:italic}
.nc-bottom{display:flex;align-items:center;gap:10px}
.nc-link{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--accent2);text-decoration:none}
.nc-link:hover{text-decoration:underline}
.nc-toggle-orig{font-family:var(--font-mono);font-size:9px;color:var(--muted);background:none;border:none;
  cursor:pointer;text-decoration:underline}

#empty-state,#loading-state{text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--font-mono);font-size:12px}
#loading-state .spin{display:inline-block;animation:spin .8s linear infinite;margin-bottom:8px;font-size:20px}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);z-index:400;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;
  font-family:var(--font-mono);font-size:11px;color:var(--text);opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="topbar">
  <a id="back-link" href="index.html">← Gráficos</a>
  <div id="title-block">
    <span class="t1">📰 Noticias Cripto</span>
    <span class="t2" id="status-sub">Cargando fuentes…</span>
  </div>
  <button id="refresh-btn" title="Actualizar noticias">
    <span id="refresh-icon">&#x21bb;</span><span>Actualizar</span>
  </button>
  <div id="notif-slot"></div>
</div>

<div id="filterbar">
  <div class="chip-group" id="sent-filters">
    <button class="f-chip active" data-f="all">Todas</button>
    <button class="f-chip" data-f="up">🟢 Alcistas</button>
    <button class="f-chip" data-f="down">🔴 Bajistas</button>
    <button class="f-chip" data-f="alto">🔥 Alto impacto</button>
  </div>
  <select id="sort-select">
    <option value="relevancia">Ordenar: relevancia</option>
    <option value="recientes">Ordenar: más recientes</option>
  </select>
  <span id="status-line"></span>
</div>

<div id="news-wrap">
  <div id="loading-state"><div class="spin">◐</div><div>Cargando noticias de las principales fuentes cripto…</div></div>
  <div id="news-list" style="display:flex;flex-direction:column;gap:10px;"></div>
  <div id="empty-state" style="display:none">No hay noticias que coincidan con este filtro.</div>
</div>

<div id="toast"></div>

<script src="notif.js"></script>
<script>
'use strict';

// ─── FUENTES RSS ───────────────────────────────────────────────────────────
// Para añadir/quitar una fuente, solo edita esta lista (name = como se
// muestra, url = feed RSS/Atom público del sitio).
const FEEDS = [
  {name:'CoinDesk',        url:'https://www.coindesk.com/arc/outboundfeeds/rss/'},
  {name:'Cointelegraph',   url:'https://cointelegraph.com/rss'},
  {name:'Decrypt',         url:'https://decrypt.co/feed'},
  {name:'CryptoSlate',     url:'https://cryptoslate.com/feed/'},
  {name:'Bitcoin Magazine',url:'https://bitcoinmagazine.com/feed'},
  {name:'NewsBTC',         url:'https://www.newsbtc.com/feed/'},
  {name:'Bitcoinist',      url:'https://bitcoinist.com/feed/'},
  {name:'U.Today',         url:'https://u.today/rss'},
  {name:'CryptoPotato',    url:'https://cryptopotato.com/feed/'},
  {name:'The Defiant',     url:'https://thedefiant.io/feed'},
];

// ─── PROXIES CORS (los RSS no traen cabeceras CORS, así que hace falta uno) ─
// Se intenta cada uno en orden hasta que alguno responda; si el que está de
// moda cae algún día, basta con añadir/reordenar esta lista, no hace falta
// tocar nada más.
const CORS_PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u,
];
async function fetchWithProxies(url, timeoutMs){
  timeoutMs = timeoutMs || 15000;
  let lastErr;
  for(const build of CORS_PROXIES){
    try{
      const ctrl = ('AbortController' in window) ? new AbortController() : null;
      const t = ctrl ? setTimeout(()=>ctrl.abort(), timeoutMs) : null;
      const r = await fetch(build(url), {signal: ctrl?ctrl.signal:undefined});
      if(t) clearTimeout(t);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const text = await r.text();
      if(!text || text.length<50) throw new Error('respuesta vacía');
      return text;
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('todos los proxies fallaron');
}

// ─── COLA CON CONCURRENCIA LIMITADA (para no lanzar 10 feeds a la vez) ─────
function makeQueue(maxConcurrent){
  let active=0; const q=[];
  function pump(){ while(active<maxConcurrent && q.length){ const job=q.shift(); active++; job().finally(()=>{active--; pump();}); } }
  return fn => new Promise((resolve,reject)=>{ q.push(()=>fn().then(resolve,reject)); pump(); });
}
const queueFeed = makeQueue(3);
const queueTranslate = makeQueue(3);

// ─── PARSEO RSS/ATOM ────────────────────────────────────────────────────────
function stripHtml(s){ return (s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim(); }
function parseFeedXML(xmlText, sourceName){
  const items=[];
  try{
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    if(doc.querySelector('parsererror')) return items;
    const nodes = doc.querySelectorAll('item, entry');
    nodes.forEach(node=>{
      const title = stripHtml(node.querySelector('title')?.textContent || '');
      let link = '';
      const linkNodes = node.querySelectorAll('link');
      linkNodes.forEach(l=>{
        if(link) return;
        const href = l.getAttribute('href');
        if(href && (!l.getAttribute('rel') || l.getAttribute('rel')==='alternate')) link=href;
        else if(!href && l.textContent) link=l.textContent.trim();
      });
      const dateStr = node.querySelector('pubDate')?.textContent
        || node.querySelector('published')?.textContent
        || node.querySelector('updated')?.textContent || '';
      const date = dateStr ? new Date(dateStr) : new Date();
      const desc = stripHtml(node.querySelector('description')?.textContent
        || node.querySelector('summary')?.textContent
        || node.querySelector('content')?.textContent || '');
      if(title && link){
        items.push({title, link, date: isNaN(date.getTime())?new Date():date, desc:desc.slice(0,280), source:sourceName});
      }
    });
  }catch(e){}
  return items;
}
async function loadAllFeeds(){
  const settled = await Promise.allSettled(
    FEEDS.map(f => queueFeed(()=>fetchWithProxies(f.url).then(xml=>parseFeedXML(xml, f.name))))
  );
  let all=[], failedSources=[];
  settled.forEach((r,i)=>{
    if(r.status==='fulfilled') all = all.concat(r.value);
    else failedSources.push(FEEDS[i].name);
  });
  return {items:all, failedSources};
}

// ─── TRADUCCIÓN AL ESPAÑOL (MyMemory API, con caché local) ─────────────────
let trCache = {};
try{ trCache = JSON.parse(localStorage.getItem('hlchart:news:trcache')||'{}'); }catch(e){}
function saveTrCache(){
  try{
    const keys=Object.keys(trCache);
    if(keys.length>600){ keys.slice(0, keys.length-600).forEach(k=>delete trCache[k]); }
    localStorage.setItem('hlchart:news:trcache', JSON.stringify(trCache));
  }catch(e){}
}
async function translateToEs(text){
  if(!text) return '';
  const key = text.slice(0,200);
  if(trCache[key]) return trCache[key];
  try{
    const url = 'https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.slice(0,480))+'&langpair=en|es';
    const ctrl = ('AbortController' in window) ? new AbortController() : null;
    const t = ctrl ? setTimeout(()=>ctrl.abort(), 10000) : null;
    const r = await fetch(url, {signal: ctrl?ctrl.signal:undefined});
    if(t) clearTimeout(t);
    const d = await r.json();
    const translated = d && d.responseData && d.responseData.translatedText;
    if(translated && !/MYMEMORY WARNING/i.test(translated)){
      trCache[key]=translated; saveTrCache();
      return translated;
    }
  }catch(e){}
  return text; // si falla la traducción, mostramos el original antes que dejarlo vacío
}

// ─── CLASIFICACIÓN (alcista/bajista + impacto) ─────────────────────────────
// Heurística por palabras clave: no es un análisis de IA, es una aproximación
// rápida y transparente basada en el vocabulario típico de estas noticias.
const BULLISH_WORDS = ['surge','surges','rally','rallies','soar','soars','jump','jumps','gain','gains',
  'record high','all-time high','all time high',' ath ','breakout','adopt','adoption','approve','approved',
  'approval','bullish','inflow','inflows','partnership','launch','launches','launched','integrate','integrates',
  'integration','upgrade','expands','expansion','outperform','rebound','recovery','recovers','milestone',
  'institutional','invest','investment','invests','greenlight','boom','skyrocket','climbs','climb','rises',
  'rise','risen','soaring','breakthrough','surpasses','surpass'];
const BEARISH_WORDS = ['crash','crashes','plunge','plunges','dump','dumps','sell-off','selloff','hack','hacked',
  'exploit','exploited','breach','stolen','theft','lawsuit','sues','sued','charges','charged','fraud','scam',
  'ban','banned','bans','restrict','restriction','delist','delisting','collapse','bankrupt','bankruptcy',
  'insolvency','liquidation','liquidated','outflow','outflows','decline','declines','drop','drops','falls',
  'fall','fell','tumbles','tumble','warns','warning','concerns','bearish','investigation','probe','seize',
  'seized','freeze','frozen','halts','halted','suspends','suspended','slump','sinks'];
const HIGH_IMPACT_WORDS = ['sec ','sec,','sec.','etf','fed ','federal reserve','interest rate','regulation',
  'regulatory','congress','senate','lawsuit','hack','hacked','billion','halving','cpi','inflation','bankruptcy',
  'cftc','executive order','ban','approval','approved','blackrock','stablecoin','depeg','systemic','emergency',
  'exploit','breach','white house','treasury','imf','g7','trump','biden'];
function classify(title, desc){
  const text = ' '+(title+' '+(desc||'')).toLowerCase()+' ';
  let bull=0, bear=0, impact=0;
  BULLISH_WORDS.forEach(w=>{ if(text.includes(w)) bull++; });
  BEARISH_WORDS.forEach(w=>{ if(text.includes(w)) bear++; });
  HIGH_IMPACT_WORDS.forEach(w=>{ if(text.includes(w)) impact++; });
  let sentiment='neutral';
  if(bull>bear) sentiment='up'; else if(bear>bull) sentiment='down';
  const impactScore = impact*1.4 + Math.max(bull,bear)*0.6;
  let impactLevel='bajo';
  if(impactScore>=3) impactLevel='alto';
  else if(impactScore>=1.4) impactLevel='medio';
  return {sentiment, impactLevel, impactScore};
}

// ─── ESTADO ─────────────────────────────────────────────────────────────────
let items = [];               // noticias actuales, ya clasificadas y (si se pudo) traducidas
let seenIds = new Set();      // ids ya vistos (persistido) — para detectar "nuevas"
let firstLoadDone = false;
let currentFilter = 'all';
let currentSort = localStorage.getItem('hlchart:news:sort') || 'relevancia';
document.getElementById('sort-select').value = currentSort;

try{
  const raw = JSON.parse(localStorage.getItem('hlchart:news:seen')||'[]');
  if(Array.isArray(raw)) seenIds = new Set(raw);
}catch(e){}
function saveSeen(){
  try{
    const arr = Array.from(seenIds);
    localStorage.setItem('hlchart:news:seen', JSON.stringify(arr.slice(-500)));
  }catch(e){}
}
function idFor(item){ return item.link; }

function timeAgo(date){
  const diffMin = Math.max(0, Math.round((Date.now()-date.getTime())/60000));
  if(diffMin<1) return 'ahora mismo';
  if(diffMin<60) return 'hace '+diffMin+' min';
  const h = Math.floor(diffMin/60);
  if(h<24) return 'hace '+h+'h';
  const d = Math.floor(h/24);
  return 'hace '+d+'d';
}
function fmtClock(date){
  const pad2=n=>String(n).padStart(2,'0');
  return pad2(date.getHours())+':'+pad2(date.getMinutes());
}

// ─── PIPELINE PRINCIPAL ─────────────────────────────────────────────────────
async function refreshNews(manual){
  const btn=document.getElementById('refresh-btn');
  const statusSub=document.getElementById('status-sub');
  const statusLine=document.getElementById('status-line');
  btn.classList.add('loading');
  statusSub.textContent='Actualizando…';
  try{
    const {items:raw, failedSources} = await loadAllFeeds();
    // Deduplicar por enlace (varias fuentes a veces republican lo mismo)
    const byLink = new Map();
    raw.forEach(it=>{ if(!byLink.has(it.link)) byLink.set(it.link, it); });
    const uniqueRaw = Array.from(byLink.values()).sort((a,b)=>b.date-a.date).slice(0,150);

    // Clasificar (rápido, local) a todos
    uniqueRaw.forEach(it=>{
      const c = classify(it.title, it.desc);
      it.sentiment=c.sentiment; it.impactLevel=c.impactLevel; it.impactScore=c.impactScore;
    });

    // Detectar cuáles son nuevas ANTES de traducir (para no hacer esperar la
    // notificación a que termine de traducir las 150 noticias)
    const newOnes = uniqueRaw.filter(it=>!seenIds.has(idFor(it)));
    const isVeryFirstLoad = seenIds.size===0;

    // Traducir solo lo que hace falta (con caché, y con cola limitada para no
    // saturar la API gratuita de traducción)
    await Promise.all(uniqueRaw.map(it => queueTranslate(async ()=>{
      it.titleEs = await translateToEs(it.title);
    })));

    items = uniqueRaw;
    uniqueRaw.forEach(it=>seenIds.add(idFor(it)));
    saveSeen();

    if(!isVeryFirstLoad && newOnes.length) flagNew(newOnes);
    render();

    const now=new Date();
    statusSub.textContent = 'Actualizado '+fmtClock(now)+(failedSources.length?(' · '+failedSources.length+' fuente(s) no respondieron'):'');
    statusLine.textContent = items.length+' noticias · próxima actualización en 3 min';

    if(!isVeryFirstLoad && newOnes.length){
      const top = newOnes.sort((a,b)=>b.impactScore-a.impactScore)[0];
      HLNotif.bumpUnread(newOnes.length);
      const label = newOnes.length===1 ? '📰 1 noticia nueva' : '📰 '+newOnes.length+' noticias nuevas';
      HLNotif.notify(label, (top.titleEs||top.title), ()=>{ window.open(top.link, '_blank'); });
      showToast(label);
    }
    firstLoadDone = true;
  }catch(e){
    statusSub.textContent='Error al actualizar. Reintentando pronto…';
    setTimeout(()=>refreshNews(false), 20000);
  }finally{
    btn.classList.remove('loading');
    document.getElementById('loading-state').style.display='none';
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
const SENT_LABEL = {up:'🟢 Alcista', down:'🔴 Bajista', neutral:'🟡 Neutral'};
const IMPACT_LABEL = {alto:'🔥 Alto impacto', medio:'⚡ Impacto medio', bajo:'Impacto bajo'};

function scoreForSort(it){
  const impactWeight = it.impactLevel==='alto'?3:(it.impactLevel==='medio'?2:1);
  const hoursOld = (Date.now()-it.date.getTime())/3600000;
  return impactWeight*10 - Math.min(hoursOld,24)*0.4;
}
function render(){
  const list=document.getElementById('news-list');
  const empty=document.getElementById('empty-state');
  let filtered = items.filter(it=>{
    if(currentFilter==='up') return it.sentiment==='up';
    if(currentFilter==='down') return it.sentiment==='down';
    if(currentFilter==='alto') return it.impactLevel==='alto';
    return true;
  });
  if(currentSort==='recientes') filtered.sort((a,b)=>b.date-a.date);
  else filtered.sort((a,b)=>scoreForSort(b)-scoreForSort(a));

  if(!filtered.length){
    list.innerHTML=''; empty.style.display='block'; return;
  }
  empty.style.display='none';
  list.innerHTML = filtered.map(it=>{
    const sentCls = it.sentiment;
    return '<div class="news-card'+(it._justArrived?' is-new':'')+'">'
      +'<div class="nc-top">'
        +'<span class="nc-source">'+esc(it.source)+'</span>'
        +'<span class="nc-badge '+sentCls+'">'+SENT_LABEL[it.sentiment]+'</span>'
        +'<span class="nc-badge impact-'+it.impactLevel+'">'+IMPACT_LABEL[it.impactLevel]+'</span>'
        +(it._justArrived?'<span class="nc-new-tag">NUEVO</span>':'')
        +'<span class="nc-time">'+timeAgo(it.date)+' · '+fmtClock(it.date)+'</span>'
      +'</div>'
      +'<a class="nc-title" href="'+esc(it.link)+'" target="_blank" rel="noopener">'+esc(it.titleEs||it.title)+'</a>'
      +'<div class="nc-bottom">'
        +'<a class="nc-link" href="'+esc(it.link)+'" target="_blank" rel="noopener">Ver fuente ↗</a>'
        +'<button class="nc-toggle-orig" data-link="'+esc(it.link)+'">ver original</button>'
      +'</div>'
      +'<div class="nc-original" data-orig-for="'+esc(it.link)+'" style="display:none">'+esc(it.title)+'</div>'
    +'</div>';
  }).join('');

  list.querySelectorAll('.nc-toggle-orig').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const el = list.querySelector('[data-orig-for="'+CSS.escape(btn.dataset.link)+'"]');
      if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
    });
  });
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Marcamos _justArrived en el momento de detectar nuevas (antes de traducir),
// para que render() pinte el resaltado; se limpia a los 60s.
function flagNew(newOnes){
  newOnes.forEach(it=>{ it._justArrived=true; });
  setTimeout(()=>{ newOnes.forEach(it=>{ it._justArrived=false; }); render(); }, 60000);
}

// ─── FILTROS / ORDEN / REFRESH MANUAL ──────────────────────────────────────
document.getElementById('sent-filters').addEventListener('click', e=>{
  const btn=e.target.closest('.f-chip'); if(!btn) return;
  document.querySelectorAll('#sent-filters .f-chip').forEach(b=>b.classList.toggle('active', b===btn));
  currentFilter = btn.dataset.f;
  render();
});
document.getElementById('sort-select').addEventListener('change', e=>{
  currentSort = e.target.value;
  try{ localStorage.setItem('hlchart:news:sort', currentSort); }catch(err){}
  render();
});
document.getElementById('refresh-btn').addEventListener('click', ()=>refreshNews(true));

// ─── NOTIFICACIONES (campana compartida) + badge de no leídas ──────────────
HLNotif.buildBell(document.getElementById('notif-slot'));
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) HLNotif.clearUnread(); });
if(!document.hidden) HLNotif.clearUnread();

// ─── INIT: primera carga + auto-refresh cada 3 minutos ─────────────────────
(async function init(){
  await refreshNews(false);
})();
setInterval(()=>refreshNews(false), 3*60*1000);
</script>
